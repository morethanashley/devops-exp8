name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Continuous Integration (CI) Job: Install dependencies and run tests
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set up Node.js (if needed, adjust to your setup)
        uses: actions/setup-node@v3
        with:
          node-version: '14'  # Change this to the version of Node.js you're using

      - name: Install dependencies (if using npm/yarn)
        run: npm install  # Adjust if you're using yarn or another package manager

      - name: Run tests (if you have test scripts defined)
        run: npm test  # Adjust to your test command

  # Continuous Deployment (CD) Job: Deploy the app (example using SSH)
  cd:
    needs: ci  # This ensures the CD job only runs after CI is successful
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Deploy to server (SSH example)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}  # Store SSH key in GitHub secrets
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -i private_key.pem user@your-server.com "cd /path/to/your/app && git pull && npm install && pm2 restart app"  # Adjust as needed